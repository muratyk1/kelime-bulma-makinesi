<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Kelime Bulma Makinesi">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Kelime Bulma Makinesi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a1628;
    --bg2: #0d1e38;
    --bg3: #112244;
    --bg4: #1a3060;
    --text: #e8f0fe;
    --text2: #a8c0e8cc;
    --text3: #6890c880;
    --accent: #4da6ff;
    --red: #ff453a;
    --gold: #ffd60a;
    --border: #1e3a6e;
    --border-light: #2a4f8a55;
    --green: #30d158;
    --radius: 14px;
    --radius-sm: 10px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }

  /* NAV */
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; border-bottom: 0.5px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
  .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  .nav-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg4); border: 0.5px solid var(--border-light); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }

  /* SCROLL AREA */
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 40px; }

  /* INPUTS */
  .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .input-wrap { position: relative; }
  .input-label { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); pointer-events: none; transition: all 0.2s; }
  .field { width: 100%; background: var(--bg3); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 14px; font-size: 17px; color: var(--text); letter-spacing: 1.5px; text-transform: uppercase; outline: none; -webkit-appearance: none; }
  .field:focus { border-color: var(--accent); box-shadow: 0 0 0 2px #4da6ff22; }
  .field::placeholder { color: var(--text3); letter-spacing: 0; text-transform: none; font-size: 16px; }
  .field-small { font-size: 15px; padding: 12px 14px; }
  .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  /* BUTTONS */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .btn { width: 100%; height: 50px; border-radius: var(--radius); border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { opacity: 0.8; transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }

  /* LENGTH FILTER PILLS */
  .len-filters { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px; scrollbar-width: none; }
  .len-filters::-webkit-scrollbar { display: none; }
  .len-pill { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border-light); background: var(--bg3); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .len-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* SECTION */
  .section-header { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; padding: 16px 0 8px; }

  /* WORD CARDS */
  .word-list { display: flex; flex-direction: column; }
  .word-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .word-item:last-child { border-bottom: none; }
  .word-item:active { background: var(--bg3); margin: 0 -16px; padding: 10px 16px; border-radius: 0; }
  .word-star { font-size: 16px; flex-shrink: 0; }
  .word-text { font-size: 15px; font-weight: 500; letter-spacing: 0.3px; flex: 1; color: var(--text); }
  .word-score { background: var(--red); color: #fff; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; min-width: 32px; text-align: center; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 16px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .empty-sub { font-size: 14px; color: var(--text3); }

  /* HINTS */
  .hint-card { background: var(--bg3); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border-light); }
  .hint-row { display: flex; align-items: flex-start; gap: 12px; }
  .hint-icon { font-size: 28px; flex-shrink: 0; }
  .hint-content h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .hint-content p { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .hint-btn { display: flex; justify-content: flex-end; margin-top: 10px; }
  .hint-action { background: var(--bg4); color: var(--accent); border: 1px solid var(--border-light); padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(5,10,25,0.85); z-index: 999; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border-light); padding: 12px 20px 40px; width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-word { font-size: 28px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; color: var(--text); }
  .modal-meta { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
  .modal-score-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--red); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
  .modal-section-title { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
  .modal-meaning { font-size: 15px; color: var(--text); line-height: 1.6; background: var(--bg3); border: 1px solid var(--border-light); padding: 14px; border-radius: var(--radius-sm); min-height: 80px; }
  .modal-close { width: 100%; background: var(--bg4); color: var(--text); border: 1px solid var(--border-light); height: 50px; border-radius: var(--radius); font-size: 16px; font-weight: 500; margin-top: 16px; cursor: pointer; }
  .loading-dots::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

  /* SETTINGS */
  .settings-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 998; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); overflow-y: auto; }
  .settings-overlay.open { transform: translateX(0); }
  .settings-nav { display: flex; align-items: center; gap: 8px; padding: 12px 16px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg2); }
  .settings-back { background: none; border: none; color: var(--accent); font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .settings-body { padding: 24px 16px; }
  .settings-group { background: var(--bg3); border-radius: var(--radius); border: 1px solid var(--border-light); margin-bottom: 20px; overflow: hidden; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 16px; color: var(--text); }
  .settings-value { font-size: 15px; color: var(--text2); }
  .section-anchor { display: block; height: 0; }
</style>
</head>
<body>

<!-- MAIN NAV -->
<div class="nav">
  <div style="width:36px"></div>
  <div class="nav-title">Kelime Bulma Makinesi</div>
  <button class="nav-btn" onclick="openSettings()" aria-label="Ayarlar">⚙️</button>
</div>

<!-- MAIN SCROLL -->
<div class="scroll" id="mainScroll">

  <!-- INPUTS -->
  <div class="input-group">
    <div class="input-wrap">
      <input id="lettersInput" class="field" type="text" placeholder="Harfler (Joker: ?)" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" oninput="syncLetters()" onkeydown="if(event.key==='Enter')findWords()">
    </div>
    <div class="filter-row">
      <input id="startsWith" class="field field-small" type="text" placeholder="Başında" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      <input id="contains" class="field field-small" type="text" placeholder="İçinde" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      <input id="endsWith" class="field field-small" type="text" placeholder="Sonunda" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="findWords()">Kelimeleri Bul</button>
    <button class="btn btn-danger" onclick="clearAll()">Temizle</button>
  </div>

  <div id="resultsArea"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-word" id="modalWord"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-score-badge" id="modalScore"></div>
    <div class="modal-section-title">ANLAMI</div>
    <div class="modal-meaning" id="modalMeaning"></div>
    <button class="modal-close" onclick="closeModal()">Kapat</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-nav">
    <button class="settings-back" onclick="closeSettings()">← Geri</button>
    <span style="font-size:17px;font-weight:600;margin-left:8px;color:var(--text)">Ayarlar</span>
  </div>
  <div class="settings-body">
    <p class="settings-note">Sözlük</p>
    <div class="settings-group">
      <div class="settings-row">
        <span class="settings-label">🇹🇷 Sözlük Dili</span>
        <span class="settings-value">Türkçe</span>
      </div>
      <div class="settings-row">
        <span class="settings-label">📚 Kelime Sayısı</span>
        <span class="settings-value" id="wordCountSetting">–</span>
      </div>
    </div>
    <p class="settings-note">Sıralama</p>
    <div class="settings-group">
      <div class="settings-row">
        <span class="settings-label">Sıralama</span>
        <span class="settings-value">Harf × Puan (azalan)</span>
      </div>
    </div>
    <p class="settings-note">PWA Kurulum</p>
    <div class="settings-group">
      <div class="settings-row">
        <span class="settings-label" style="font-size:14px">iPhone için Safari'de aç → Paylaş → Ana Ekrana Ekle</span>
      </div>
    </div>
    <p class="settings-note" style="margin-top:8px">Joker harf için ? kullanın. Kaç ? varsa o kadar joker sayılır.</p>
  </div>
</div>

// ─── SCORES ──────────────────────────────────────────────
const SC = {A:1,B:3,C:4,Ç:4,D:3,E:1,F:7,G:5,Ğ:8,H:5,I:2,İ:1,J:10,K:1,L:1,M:2,N:1,O:2,Ö:7,P:5,R:1,S:2,Ş:4,T:1,U:2,Ü:3,V:7,Y:3,Z:4};

function scoreWord(w) { return w.split('').reduce((s,c)=>s+(SC[c]||0),0); }

function normalize(s) {
  return s.toUpperCase()
    .replace(/I/g,'İ').replace(/ı/g,'I')
    .replace(/\s/g,'');
}

function canMake(word, letters) {
  const pool = [...letters];
  for (let ch of word) {
    const i = pool.indexOf(ch);
    if (i === -1) {
      const j = pool.indexOf('?');
      if (j === -1) return false;
      pool.splice(j, 1);
    } else {
      pool.splice(i, 1);
    }
  }
  return true;
}

let currentResults = [];

function syncLetters() {
  const v = document.getElementById('lettersInput').value;
  document.getElementById('lettersInput').value = v.toUpperCase();
}

function findWords() {
  const raw = normalize(document.getElementById('lettersInput').value);
  const sw = normalize(document.getElementById('startsWith').value);
  const ct = normalize(document.getElementById('contains').value);
  const ew = normalize(document.getElementById('endsWith').value);

  if (!raw) {
    showEmpty('Harfleri gir', 'Üstteki kutuya harflerini yaz ve "Kelimeleri Bul"a bas');
    return;
  }

  const letters = raw.split('');

  // Build pool that includes joker letters
  // Extra letters for startsWith/contains/endsWith that are NOT in the hand
  // We allow words that require those letters to be among the extra letters
  // Filter: word must be makeable from letters + use the filter constraints

  let matched = TURKISH_WORDS.filter(word => {
    // starts with filter
    if (sw && !word.startsWith(sw)) return false;
    // ends with filter
    if (ew && !word.endsWith(ew)) return false;
    // contains filter (anywhere)
    if (ct && !word.includes(ct)) return false;
    // can make from letters
    return canMake(word, letters);
  });

  // Remove duplicates
  matched = [...new Set(matched)];

  // Sort: primary = length desc, secondary = score desc
  matched.sort((a,b) => {
    if (b.length !== a.length) return b.length - a.length;
    return scoreWord(b) - scoreWord(a);
  });

  currentResults = matched;
  renderResults(matched);
  document.getElementById('wordCountSetting').textContent = TURKISH_WORDS.length + ' kelime';
}

function renderResults(list) {
  const area = document.getElementById('resultsArea');
  if (!list.length) {
    showEmpty('Kelime bulunamadı', 'Farklı harf kombinasyonları deneyin veya filtreleri değiştirin');
    return;
  }

  // Group by length
  const byLen = {};
  list.forEach(w => { (byLen[w.length]=byLen[w.length]||[]).push(w); });
  const lens = Object.keys(byLen).map(Number).sort((a,b)=>b-a);

  // Build length pills: top 4 distinct lengths shown individually, rest = "Diğer"
  const topLens = lens.slice(0, 4);
  const otherLens = lens.slice(4);
  let pillsHTML = '';
  topLens.forEach(len => {
    pillsHTML += `<div class="len-pill" data-len="${len}" onclick="scrollToLen(${len},this)">${len} harf</div>`;
  });
  if (otherLens.length) {
    pillsHTML += `<div class="len-pill" data-len="other" onclick="scrollToLen('other',this)">Diğer</div>`;
  }

  // Word sections
  let sectionsHTML = '';
  lens.forEach(len => {
    const isOther = !topLens.includes(len);
    const anchorId = isOther ? 'len-other' : `len-${len}`;
    sectionsHTML += `<div class="section-anchor" id="${anchorId}"></div><div class="section-header">${len} HARFLİ KELİMELER</div><div class="word-list">`;
    byLen[len].forEach((w,i) => {
      const sc = scoreWord(w);
      const star = i===0 ? '⭐' : '☆';
      sectionsHTML += `<div class="word-item" onclick="openModal('${w}')">
        <span class="word-star">${star}</span>
        <span class="word-text">${w}</span>
        <span class="word-score">${sc}</span>
      </div>`;
    });
    sectionsHTML += '</div>';
  });

  area.innerHTML = `<div class="len-filters" id="lenFilters">${pillsHTML}</div><div id="wordSections">${sectionsHTML}</div>`;

  // Activate first pill
  const firstPill = area.querySelector('.len-pill');
  if (firstPill) firstPill.classList.add('active');
}

function scrollToLen(len, pill) {
  document.querySelectorAll('.len-pill').forEach(p => p.classList.remove('active'));
  if (pill) pill.classList.add('active');
  const anchorId = len === 'other' ? 'len-other' : `len-${len}`;
  const el = document.getElementById(anchorId);
  if (el) {
    const scroll = document.getElementById('mainScroll');
    const top = el.getBoundingClientRect().top + scroll.scrollTop - scroll.getBoundingClientRect().top - 8;
    scroll.scrollTo({ top, behavior: 'smooth' });
  }
}

function showEmpty(title, sub) {
  const area = document.getElementById('resultsArea');
  const isFirst = !currentResults.length;
  if (isFirst) {
    area.innerHTML = `<div class="hint-card">
      <div class="hint-row">
        <div class="hint-icon">💡</div>
        <div class="hint-content"><h3>Nasıl Kullanılır?</h3><p>Harfleri üstteki kutuya yaz. Joker harf için <strong>?</strong> kullan. Başında/İçinde/Sonunda filtrelerini isteğe göre doldur.</p></div>
      </div>
      <div class="hint-btn"><button class="hint-action" onclick="showExample()">Örneği Göster ↗</button></div>
    </div>`;
  } else {
    area.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
  }
}

function showExample() {
  document.getElementById('lettersInput').value = 'GYFTRAE';
  document.getElementById('startsWith').value = '';
  document.getElementById('contains').value = '';
  document.getElementById('endsWith').value = '';
  findWords();
}

function clearAll() {
  document.getElementById('lettersInput').value = '';
  document.getElementById('startsWith').value = '';
  document.getElementById('contains').value = '';
  document.getElementById('endsWith').value = '';
  currentResults = [];
  showEmpty('','');
}

// ─── MODAL ───────────────────────────────────────────────
function openModal(word) {
  const sc = scoreWord(word);
  document.getElementById('modalWord').textContent = word;
  document.getElementById('modalMeta').textContent = `${word.length} harf`;
  document.getElementById('modalScore').innerHTML = `🎯 ${sc} puan`;
  document.getElementById('modalMeaning').innerHTML = '<span class="loading-dots">Yükleniyor</span>';
  document.getElementById('modalOverlay').classList.add('open');
  fetchMeaning(word);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function fetchMeaning(word) {
  try {
    const res = await fetch(`https://sozluk.gov.tr/gts?ara=${encodeURIComponent(word.toLowerCase().replace(/İ/g,'i').replace(/I/g,'ı').replace(/Ğ/g,'ğ').replace(/Ş/g,'ş').replace(/Ü/g,'ü').replace(/Ö/g,'ö').replace(/Ç/g,'ç'))}`, {signal: AbortSignal.timeout(5000)});
    const data = await res.json();
    if (data && data[0] && data[0].anlamlarListe && data[0].anlamlarListe.length) {
      const anlamlar = data[0].anlamlarListe.slice(0,3).map((a,i)=>`${i+1}. ${a.anlam}`).join('<br><br>');
      document.getElementById('modalMeaning').innerHTML = anlamlar;
    } else {
      document.getElementById('modalMeaning').textContent = 'Anlam bulunamadı.';
    }
  } catch(e) {
    document.getElementById('modalMeaning').innerHTML = 'TDK sözlüğüne bağlanılamadı.<br><small style="color:var(--text3)">İnternet bağlantısını kontrol edin.</small>';
  }
}

function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }

// Init
document.addEventListener('DOMContentLoaded', ()=>{
  showEmpty('','');
  document.getElementById('wordCountSetting').textContent = TURKISH_WORDS.length + ' kelime';
  ['startsWith','contains','endsWith'].forEach(id=>{
    document.getElementById(id).addEventListener('input', function(){
      this.value = this.value.toUpperCase();
    });
  });
});
</script>
